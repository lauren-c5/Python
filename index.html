<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haunted Haven & Python Games</title>

    <link rel="stylesheet" href="https://pyscript.net/latest/core.css" />
    <script type="module" src="https://pyscript.net/latest/core.js"></script>

    <style>
        body {
            background-color: #121212;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: #ffffff; }
        #game-container {
            background-color: #1a1a1a;
            border: 2px solid #333;
            padding: 20px;
            min-height: 400px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Welcome to Haunted Haven</h1>
    <p>Play my text adventure game directly in your browser below!</p>
    <hr>

    <div id="game-container">
        <script type="py-config">
            type = "mpy"
            [[files]]
            from = "."
            include = ["Haunted_Haven.py"]
        </script>

        <mpy-terminal></mpy-terminal>

        <script type="mpy" src="Haunted_Haven.py" target="mpy-terminal"></script>
    </div>

</body>
</html>
